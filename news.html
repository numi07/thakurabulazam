<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>সংবাদ পোর্টাল | ঠাকুর আবুল আজম</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap');

        html, body { height: 100%; margin: 0; user-select: none; }
        body { font-family: 'Hind Siliguri', sans-serif; background-color: #f3f4f6; display: flex; flex-direction: column; }
        main { flex: 1; }

        /* কার্ড গ্রিড - হোমপেজ */
        .card-media-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; cursor: pointer; }
        .grid-img-box { position: relative; width: 100%; aspect-ratio: 1 / 1; overflow: hidden; border-radius: 12px; background: #dfe3e8; }
        .grid-img-box img { width: 100%; height: 100%; object-fit: cover; }
        .more-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.6); color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 1.2rem; border-radius: 12px; }

        /* স্লাইডার ফিক্স - যাতে ফটো সম্পূর্ণ দেখা যায় */
        .slider-container { 
            position: relative; 
            width: 100%; 
            background: #000; 
            overflow: hidden; 
            border-radius: 20px 20px 0 0;
            display: flex;
            align-items: center;
            /* মোবাইল ও ডেস্কটপ উভয় ক্ষেত্রেই ফটো যাতে কেটে না যায় */
            min-height: 250px;
            max-height: 500px;
            aspect-ratio: 16 / 9; 
        }

        .slides { display: flex; transition: transform 0.5s ease-in-out; height: 100%; width: 100%; }
        
        .slide-item { 
            flex: 0 0 100%; 
            height: 100%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            background: #000;
        }
        
        /* সম্পূর্ণ ফটো দেখার জন্য ফিক্স */
        .slide-item img { 
            max-width: 100%; 
            max-height: 100%; 
            width: auto; 
            height: auto; 
            object-fit: contain !important; /* এটি ফটোকে ফ্রেমের ভেতরে পূর্ণাঙ্গ আকারে রাখবে */
        }
        
        .slide-item iframe { width: 100%; height: 100%; border: none; }

        .nav-arrow { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(255,255,255,0.2); color: white; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; z-index: 50; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .prev { left: 10px; } .next { right: 10px; }

        .news-card { transition: all 0.3s ease; border-radius: 1.25rem; overflow: hidden; background: white; height: 100%; display: flex; flex-direction: column; border: 1px solid #eee; }
        .modal-container { max-height: 98vh; display: flex; flex-direction: column; border-radius: 24px; overflow: hidden; }
        .modal-scrollable { overflow-y: auto; flex-grow: 1; padding: 20px; }
    </style>
</head>
<body>

    <nav class="bg-white shadow-md sticky top-0 z-[1000]">
        <div class="container mx-auto px-4 py-3 flex justify-between items-center">
            <a href="index.html" class="flex items-center gap-2">
                <h1 class="text-xl md:text-2xl font-bold text-green-700">
                    <i class="fas fa-newspaper"></i> ১০নং পহরডাঙ্গা ইউনিয়ন সংবাদ পোর্টাল
                </h1>
            </a>
            <div id="authArea">
                <button onclick="login()" class="text-sm font-bold border px-4 py-2 rounded-lg hover:bg-gray-50 transition">লগইন</button>
            </div>
        </div>
    </nav>

    <main class="container mx-auto px-4 py-8">
        <div id="newsContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <p class="text-center col-span-full py-10 font-bold text-gray-400 text-xl">সংবাদ লোড হচ্ছে...</p>
        </div>
    </main>

    <div id="viewModal" class="hidden fixed inset-0 bg-black/95 flex items-center justify-center p-2 z-[10000] backdrop-blur-sm">
        <div class="bg-white w-full max-w-4xl modal-container relative shadow-2xl">
            <button onclick="closeView()" class="absolute top-3 right-3 z-[110] bg-black/50 text-white w-10 h-10 rounded-full flex items-center justify-center hover:bg-red-500 transition">×</button>
            
            <div class="slider-container">
                <div id="slideWrapper" class="slides"></div>
                <button id="pBtn" class="nav-arrow prev" onclick="moveSlide(-1)"><i class="fas fa-chevron-left"></i></button>
                <button id="nBtn" class="nav-arrow next" onclick="moveSlide(1)"><i class="fas fa-chevron-right"></i></button>
            </div>

            <div class="modal-scrollable">
                <h2 id="viewTitle" class="text-xl md:text-2xl font-bold text-gray-800 mb-3 leading-tight"></h2>
                <div class="flex justify-between items-center mb-4 pb-3 border-b">
                    <div class="flex items-center gap-3 text-sm font-bold">
                        <span id="viewLoc" class="text-indigo-600 italic"></span>
                        <span id="viewDate" class="text-gray-400"></span>
                    </div>
                    <button id="modalShare" class="text-[#1877F2] text-2xl hover:scale-110 transition"><i class="fab fa-facebook"></i></button>
                </div>
                <p id="viewDetails" class="text-gray-700 leading-relaxed whitespace-pre-line text-lg text-justify"></p>
                
                <div id="adminActions" class="mt-6 pt-4 border-t hidden flex gap-4">
                    <button class="text-gray-500 text-sm font-bold px-4 py-2 border rounded-lg hover:bg-gray-50"><i class="fas fa-edit"></i> এডিট</button>
                    <button class="text-red-500 text-sm font-bold px-4 py-2 border border-red-200 rounded-lg hover:bg-red-50"><i class="fas fa-trash"></i> ডিলিট</button>
                </div>
            </div>
        </div>
    </div>

    <footer class="bg-[#1a202c] text-white py-10 px-6 mt-auto">
        <div class="container mx-auto grid md:grid-cols-3 gap-10 border-b border-gray-700 pb-8">
            <div>
                <h2 class="text-xl font-bold mb-4">ঠাকুর আবুল আজম</h2>
                <p class="text-sm text-gray-400">ন্যায়বিচার, উন্নয়ন এবং সুশাসনের লক্ষ্যে আমাদের পথচলা।</p>
            </div>
            <div>
                <h4 class="font-bold mb-4 text-[#10b981] uppercase">দ্রুত লিঙ্ক</h4>
                <ul class="text-sm text-gray-400 space-y-2 font-bold">
                    <li><a href="index.html" class="hover:text-white transition">হোম</a></li>
                    <li><a href="about.html" class="hover:text-white transition">আমার সম্পর্কে</a></li>
                </ul>
            </div>
            <div>
                <h4 class="font-bold mb-4 text-[#10b981] uppercase">যোগাযোগ</h4>
                <p class="text-sm text-gray-400 font-bold">📍 পহরডাঙ্গা, নড়াগাতী, নড়াইল</p>
                <div class="mt-4 flex gap-4 text-xl">
                    <a href="#" class="hover:text-blue-500 transition"><i class="fab fa-facebook"></i></a>
                    <a href="#" class="hover:text-green-500 transition"><i class="fab fa-whatsapp"></i></a>
                </div>
            </div>
        </div>
        <div class="container mx-auto pt-6 flex flex-col md:flex-row justify-between text-[11px] text-gray-500 font-bold text-center gap-4">
            <p>© ২০২৬ ঠাকুর আবুল আজম | সর্বস্বত্ব সংরক্ষিত</p>
            <p>কারিগরি সহায়তায়: <span class="text-[#10b981]">আল নোমান শিকদার</span></p>
        </div>
    </footer>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyAb27X-ISeO2QyPUNihgOV4w63JjkGUFbXRko8yvr-Zh2awQkvrvKMC-U4I4m5h65eWQ/exec";
        let allPosts = [];
        let currentSlide = 0;

        function toBengali(str) {
            const digits = {'0':'০','1':'১','2':'২','3':'৩','4':'৪','5':'৫','6':'৬','7':'৭','8':'৮','9':'৯'};
            return str.toString().replace(/[0-9]/g, s => digits[s] || s);
        }

        function formatImg(url, isVideo = false) {
            if (!url) return isVideo ? "https://via.placeholder.com/400x300?text=Video" : "https://via.placeholder.com/400x400?text=No+Image";
            if (isVideo) {
                const vidId = url.match(/(?:v=|be\/|embed\/)([\w-]+)/);
                return vidId ? `https://img.youtube.com/vi/${vidId[1]}/hqdefault.jpg` : "https://via.placeholder.com/400x300?text=Video";
            }
            const id = url.match(/\/d\/(.+?)\//) || url.match(/id=([^&]+)/);
            return id ? `https://drive.google.com/thumbnail?id=${id[1]}&sz=w1000` : url.trim();
        }

        function shareFB(title) {
            const url = window.location.href;
            window.open(`https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(url)}&t=${encodeURIComponent(title)}`, '_blank');
        }

        async function loadNews() {
            try {
                const res = await fetch(SCRIPT_URL);
                allPosts = await res.json();
                render();
            } catch (e) { document.getElementById('newsContainer').innerHTML = "ডেটা লোড ব্যর্থ!"; }
        }

        function render() {
            const container = document.getElementById('newsContainer');
            container.innerHTML = allPosts.map(p => {
                const imgList = p.image ? p.image.split(',').map(s => s.trim()).filter(s => s !== "") : [];
                const videoUrl = p.video ? p.video.trim() : "";
                return `
                <div class="news-card p-4">
                    <div class="card-media-grid" onclick="viewNews('${p.id}')">
                        <div class="grid-img-box"><img src="${formatImg(imgList[0])}"></div>
                        <div class="grid-img-box">
                            ${imgList.length > 1 ? `<img src="${formatImg(imgList[1])}">` : 
                              (videoUrl ? `<img src="${formatImg(videoUrl, true)}"><div class="absolute inset-0 flex items-center justify-center text-white bg-black/30"><i class="fas fa-play-circle text-4xl"></i></div>` : `<div class="w-full h-full bg-gray-100"></div>`)}
                            ${imgList.length > 2 ? `<div class="more-overlay">+${imgList.length - 1}</div>` : ''}
                        </div>
                    </div>
                    <div class="flex flex-col flex-grow">
                        <h3 class="font-bold text-gray-800 text-lg mb-2 line-clamp-2 leading-tight">${p.title}</h3>
                        <div class="mt-auto flex justify-between items-center pt-3 border-t">
                            <span class="text-[11px] font-bold text-indigo-600 italic"><i class="fas fa-map-marker-alt"></i> ${p.location}</span>
                            <div class="flex items-center gap-4">
                                <button onclick="shareFB('${p.title}')" class="text-[#1877F2] text-xl transition hover:scale-110"><i class="fab fa-facebook"></i></button>
                                <button onclick="viewNews('${p.id}')" class="text-xs font-bold text-green-700 hover:underline">বিস্তারিত</button>
                            </div>
                        </div>
                    </div>
                </div>`;
            }).join('');
        }

        function viewNews(id) {
            const p = allPosts.find(x => x.id == id);
            const imgList = p.image ? p.image.split(',').map(s => s.trim()).filter(s => s !== "") : [];
            const videoUrl = p.video ? p.video.trim() : "";
            const slideWrapper = document.getElementById('slideWrapper');
            slideWrapper.innerHTML = "";
            currentSlide = 0;
            slideWrapper.style.transform = `translateX(0)`;

            // ভিডিও এবং ফটো স্লাইডারে যোগ করা
            if(videoUrl) {
                const vidId = videoUrl.match(/(?:v=|be\/|embed\/)([\w-]+)/);
                if(vidId) slideWrapper.innerHTML += `<div class="slide-item"><iframe src="https://www.youtube.com/embed/${vidId[1]}" allowfullscreen></iframe></div>`;
            }
            imgList.forEach(img => {
                slideWrapper.innerHTML += `<div class="slide-item"><img src="${formatImg(img)}"></div>`;
            });

            const totalSlides = (videoUrl ? 1 : 0) + imgList.length;
            document.getElementById('pBtn').style.display = totalSlides > 1 ? 'flex' : 'none';
            document.getElementById('nBtn').style.display = totalSlides > 1 ? 'flex' : 'none';

            document.getElementById('viewTitle').innerText = p.title;
            document.getElementById('viewDetails').innerText = p.details;
            document.getElementById('viewLoc').innerHTML = `<i class="fas fa-map-marker-alt"></i> ${p.location}`;
            document.getElementById('viewDate').innerText = toBengali(new Date(p.date).toLocaleDateString('bn-BD'));
            
            document.getElementById('modalShare').onclick = () => shareFB(p.title);
            
            if(sessionStorage.getItem('isAdmin')) document.getElementById('adminActions').classList.remove('hidden');

            document.getElementById('viewModal').classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        function moveSlide(step) {
            const slides = document.querySelectorAll('.slide-item');
            if(slides.length === 0) return;
            currentSlide = (currentSlide + step + slides.length) % slides.length;
            document.getElementById('slideWrapper').style.transform = `translateX(-${currentSlide * 100}%)`;
        }

        function closeView() { 
            document.getElementById('viewModal').classList.add('hidden'); 
            document.getElementById('slideWrapper').innerHTML = ""; 
            document.body.style.overflow = 'auto'; 
        }

        function login() {
            const pass = prompt("পাসওয়ার্ড দিন:");
            if(pass === "1234") { // আপনার পছন্দের পাসওয়ার্ড দিন
                sessionStorage.setItem('isAdmin', 'true');
                location.reload();
            }
        }

        loadNews();
    </script>
</body>
</html>
